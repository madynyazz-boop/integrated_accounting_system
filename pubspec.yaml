name: integrated_accounting_system
description: النظام المتكامل للحسابات - Integrated Accounting System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.7

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0

  # Forms & Validation
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^9.1.0

  # Navigation
  go_router: ^13.0.1

  # Localization
  easy_localization: ^3.0.3

  # Notifications
  flutter_local_notifications: ^17.0.0

  # PDF & Printing
  pdf: ^3.10.4
  printing: ^5.11.1

  # File Picker
  file_picker: ^6.1.1
  image_picker: ^1.0.4

  # Biometric
  local_auth: ^2.1.6

  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2

  # Others
  permission_handler: ^11.0.1
  device_info_plus: ^9.1.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  flutter_native_splash: ^2.3.8
  badges: ^3.1.2
  flutter_staggered_animations: ^1.1.0
  animated_text_kit: ^4.2.2
  flutter_slidable: ^3.0.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700